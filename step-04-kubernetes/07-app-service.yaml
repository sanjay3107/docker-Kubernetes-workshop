apiVersion: v1
kind: Service
metadata:
  name: workshop-app-service
  namespace: workshop
  labels:
    app: workshop-app
spec:
  selector:
    app: workshop-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
  # NodePort exposes the service on each Node's IP at a static port
  # Access via: http://<NodeIP>:30080
  # For local (minikube): minikube service workshop-app-service -n workshop
  type: NodePort
