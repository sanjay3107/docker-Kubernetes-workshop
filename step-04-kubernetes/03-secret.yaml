apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: workshop
type: Opaque
# Values are base64 encoded
# To encode:  echo -n "mypassword" | base64
# To decode:  echo "bXlwYXNzd29yZA==" | base64 --decode
data:
  DB_PASSWORD: bXlwYXNzd29yZA==   # "mypassword"
  API_KEY: c3VwZXItc2VjcmV0LWtleQ== # "super-secret-key"
